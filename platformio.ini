; ─────────────────────────────────────────────────────────────────────────────
;  Arduino UNO Homework Projects
;  Build a specific homework:  pio run -e hw1
;  Upload:                     pio run -e hw1 -t upload
;  Serial monitor (hw2):       pio device monitor -e hw2
; ─────────────────────────────────────────────────────────────────────────────

[common]
platform  = atmelavr
board     = uno
framework = arduino
build_flags = -std=gnu++17 -flto -Wall -Werror
build_unflags = -std=gnu++11
check_tool = clangtidy
check_flags =
  clangtidy: --checks=-*,cert-*,clang-analyzer-* --fix

[env:blink]
; HW-1 — LED blink: 500 ms on / 2000 ms off
platform          = ${common.platform}
board             = ${common.board}
framework         = ${common.framework}
build_flags       = ${common.build_flags}
build_unflags     = ${common.build_unflags}
check_tool        = ${common.check_tool}
check_flags       = ${common.check_flags}
build_src_filter  = -<*> +<blink.cpp>

[env:state_machine]
; HW-2 — Serial-driven state machine via Timer1 ISR
;   send an integer → odd = LED 1 Hz blink, even = buzzer 500 Hz
platform          = ${common.platform}
board             = ${common.board}
framework         = ${common.framework}
build_flags       = ${common.build_flags}
build_unflags     = ${common.build_unflags}
check_tool        = ${common.check_tool}
check_flags       = ${common.check_flags}
monitor_speed     = 57600
build_src_filter  = -<*> +<state_machine.cpp>

[env:pwm]
; HW-3 — Hardware PWM on D10 (Timer1 Fast PWM, ~976 Hz, 25 % duty)
platform          = ${common.platform}
